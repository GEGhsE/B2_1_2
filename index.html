<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Jua', 'Gaegu', sans-serif; }
  .word-keep { word-break: keep-all; }
  .pen-font { font-family: 'Nanum Pen Script', cursive; }
  .gaegu { font-family: 'Gaegu', cursive; }

  .custom-scrollbar::-webkit-scrollbar { width: 8px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 4px; }

  html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 50%, #fecaca 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh; width: 100vw;
  }

  @keyframes bounce-slow {
    0%,100% { transform: translateY(-8%); }
    50% { transform: translateY(0); }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes float-up {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-200px) scale(0.5); opacity: 0; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
    50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.9); }
  }
  .animate-bounce-slow { animation: bounce-slow 1.5s infinite ease-in-out; }
  .animate-wiggle { animation: wiggle 0.8s infinite ease-in-out; }
  .animate-pop { animation: pop 0.5s ease-out; }
  .animate-shake { animation: shake 0.4s; }
  .animate-glow { animation: glow 1.5s infinite; }

  .reward-particle {
    position: absolute;
    pointer-events: none;
    font-size: 3rem;
    animation: float-up 2s ease-out forwards;
    z-index: 100;
  }
  .confetti-piece {
    position: absolute;
    width: 12px; height: 12px;
    animation: confetti-fall 3s ease-in forwards;
    pointer-events: none;
  }

  /* 따라읽기 하이라이트 */
  .tts-highlight {
    background: linear-gradient(180deg, transparent 60%, #fde047 60%);
    color: #c2410c;
    transition: all 0.2s;
    padding: 0 2px;
    border-radius: 4px;
  }

  /* 드롭 영역 점선 효과 */
  .drop-zone {
    background-image: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(251,146,60,0.1) 8px, rgba(251,146,60,0.1) 16px);
  }
</style>
</head>
